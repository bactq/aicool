<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>文件管理控制台</title>
  <link rel="stylesheet" href="/webcool/html/main.css">
</head>
<body>
  <main class="shell">
    <aside class="left-pane">
      <h1 class="brand">文件控制台</h1>
      <p class="brand-sub">左帧用于功能切换，右帧展示对应内容与操作结果。</p>
      <nav class="menu" aria-label="功能菜单">
        <button type="button" class="menu-btn" data-panel="panel-upload">上传文件</button>
        <button type="button" class="menu-btn active" data-panel="panel-files">文件列表</button>
        <button type="button" class="menu-btn" data-panel="panel-admin">系统管理</button>
      </nav>
      <section class="left-tag-tree-section" aria-label="文件标签树">
        <div class="left-tag-tree-head">
          <span>标签树</span>
          <button type="button" id="files-tag-toggle" class="tree-switch-btn" aria-label="展开或创建文件标签树">+</button>
        </div>
        <div id="tag-manager" class="left-tag-manager"></div>
      </section>
    </aside>

    <section class="right-pane">
      <section class="panel section" id="panel-upload">
        <h1>上传文件</h1>
        <p class="sub">支持最多三个文件同时上传，并展示实时上传进度。</p>
        <form id="upload-form" enctype="multipart/form-data">
          <div class="upload-box">
            <div class="file-row"><label>文件一</label><input type="file" name="file1"></div>
            <div class="file-row"><label>文件二</label><input type="file" name="file2"></div>
            <div class="file-row"><label>文件三</label><input type="file" name="file3"></div>
          </div>
          <input class="btn" type="submit" value="上传文件">
        </form>
        <div id="upload-progress" class="progress-wrap" aria-live="polite">
          <div class="progress-track">
            <div id="upload-progress-fill" class="progress-fill"></div>
          </div>
          <div id="upload-progress-text" class="progress-text">准备上传...</div>
        </div>
      </section>

      <section class="panel section active" id="panel-files">
        <h1>文件列表</h1>
        <p class="sub">查看、排序、预览、下载和删除已上传文件。</p>
        <div id="file-view-context" class="file-view-context">当前视图：全部文件</div>
        <div class="list-head">
          <h2>已上传文件</h2>
          <div class="sort-row">
            <span class="counter" id="file-counter">0 个文件</span>
            <label for="sort-key">排序</label>
            <select id="sort-key">
              <option value="name">按名称</option>
              <option value="size">按大小</option>
              <option value="uploaded_at">按上传时间</option>
            </select>
            <select id="sort-order">
              <option value="asc">升序</option>
              <option value="desc">降序</option>
            </select>
          </div>
        </div>
        <div class="file-table-wrap">
          <table class="file-table" id="file-table">
            <thead>
              <tr>
                <th class="file-select-col">
                  <input id="file-select-all" type="checkbox" aria-label="全选当前列表文件">
                </th>
                <th>
                  <button class="sort-btn" data-sort-key="name" type="button">
                    文件名 <span class="arrow">-</span>
                  </button>
                </th>
                <th>
                  <button class="sort-btn" data-sort-key="size" type="button">
                    文件大小 <span class="arrow">-</span>
                  </button>
                </th>
                <th>
                  <button class="sort-btn" data-sort-key="uploaded_at" type="button">
                    上传时间 <span class="arrow">-</span>
                  </button>
                </th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="file-list"></tbody>
          </table>
        </div>
        <p id="file-empty" class="empty">加载中...</p>
      </section>

      <section class="panel section" id="panel-admin">
        <h1>系统管理</h1>
        <p class="sub">执行维护操作。当前支持刷新模板缓存。</p>
        <div class="tool-row">
          <button id="reload-template-btn" type="button">刷新模板缓存</button>
        </div>
      </section>

      <div id="status" class="status"></div>
    </section>
  </main>

  <div id="preview-layer" class="preview-layer"></div>
  <div id="tag-dialog" class="tag-dialog" hidden>
    <div class="tag-dialog-backdrop" data-tag-dialog-close="1"></div>
    <div class="tag-dialog-card" role="dialog" aria-modal="true" aria-labelledby="tag-dialog-title">
      <form id="tag-dialog-form" class="tag-dialog-form">
        <div class="tag-dialog-head">
          <h2 id="tag-dialog-title">新建标签</h2>
          <p id="tag-dialog-desc">请输入标签名称。</p>
        </div>
        <label class="tag-dialog-label" for="tag-dialog-input">标签名称</label>
        <input id="tag-dialog-input" class="tag-dialog-input" type="text" maxlength="60" autocomplete="off">
        <div class="tag-dialog-actions">
          <button type="button" id="tag-dialog-cancel" class="tag-dialog-btn secondary">取消</button>
          <button type="submit" class="tag-dialog-btn">确认</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/webcool/html/main.js"></script>
</body>
</html>
