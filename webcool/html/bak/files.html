<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>文件列表</title>
  <style>
    :root {
      --bg1: #f6fbff;
      --bg2: #fff6ec;
      --ink: #1f324a;
      --muted: #627086;
      --line: #dbe7f3;
      --card: rgba(255, 255, 255, .9);
      --link: #1e6fd9;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Avenir Next", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 12% 18%, rgba(123, 210, 255, .25), transparent 36%),
        radial-gradient(circle at 90% 10%, rgba(255, 192, 128, .28), transparent 32%),
        linear-gradient(145deg, var(--bg1), var(--bg2));
    }

    .card {
      width: min(760px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: 0 18px 40px rgba(26, 49, 78, .12);
      padding: 26px;
      animation: rise .42s ease-out both;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(24px, 3.4vw, 34px);
    }

    p { margin: 0 0 14px; color: var(--muted); }

    ul { padding-left: 18px; margin: 14px 0 16px; }

    .file-item {
      padding: 8px 0;
      border-bottom: 1px dashed #d8e5f2;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .file-item:last-child { border-bottom: none; }

    .file-main {
      min-width: 0;
      flex: 1 1 auto;
    }

    .delete-form {
      margin: 0;
    }

    .delete-btn {
      border: 1px solid #e8b6b9;
      background: #fff3f4;
      color: #b23a48;
      border-radius: 9px;
      padding: 7px 12px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
    }

    .delete-btn:hover {
      background: #ffe5e8;
    }

    a {
      color: var(--link);
      font-weight: 600;
      text-decoration: none;
    }

    a:hover { text-decoration: underline; }

    .back {
      display: inline-block;
      margin-top: 6px;
      color: #587193;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 640px) {
      .file-item {
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>已上传文件</h1>
    {{FILES_CONTENT}}
    <a class="back" href="/">返回上传页面</a>
  </main>
</body>
</html>
