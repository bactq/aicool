<li class="file-item">
	<div class="file-main"><a href="/download?file={{FILE_NAME}}">{{FILE_NAME}}</a> &nbsp; {{FILE_SIZE}} 字节</div>
	<form class="delete-form" method="get" action="/delete" onsubmit="return confirm('确认删除文件：{{FILE_NAME}} ？');">
		<input type="hidden" name="file" value="{{FILE_NAME}}">
		<button class="delete-btn" type="submit">删除</button>
	</form>
</li>
