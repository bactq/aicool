<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="620" viewBox="0 0 1100 620" role="img" aria-labelledby="title desc">
  <title id="title">webcool 回收站恢复展示</title>
  <desc id="desc">展示 webcool 回收站中的文件和文件夹恢复、彻底删除以及批量操作场景。</desc>
  <rect width="1100" height="620" rx="24" fill="#f5faff"/>
  <rect x="28" y="28" width="220" height="564" rx="18" fill="#ffffff" stroke="#cfe1f3"/>
  <text x="56" y="78" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#233b5d">Recycle Bin</text>
  <rect x="54" y="118" width="168" height="42" rx="10" fill="#eaf4ff" stroke="#b7d4f0"/>
  <text x="80" y="145" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#2c5278">远程磁盘</text>
  <text x="74" y="212" font-family="Arial, sans-serif" font-size="16" fill="#355f86">⌂ 根目录</text>
  <text x="74" y="252" font-family="Arial, sans-serif" font-size="16" fill="#355f86">🗑 回收站</text>
  <rect x="278" y="28" width="794" height="564" rx="18" fill="#ffffff" stroke="#cfe1f3"/>
  <text x="314" y="78" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#233b5d">回收站内容</text>
  <rect x="314" y="110" width="726" height="60" rx="12" fill="#f7fbff" stroke="#dce8f5"/>
  <text x="342" y="146" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#516b86">☑ 名称</text>
  <text x="610" y="146" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#516b86">删除时间</text>
  <text x="760" y="146" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#516b86">原位置</text>
  <g font-family="Arial, sans-serif" font-size="15" fill="#25476a">
    <rect x="314" y="190" width="726" height="66" rx="10" fill="#ffffff" stroke="#e3edf7"/>
    <text x="342" y="230">☐ 视频素材/季度总结.mp4</text>
    <text x="610" y="230">2026-05-21 09:40</text>
    <text x="760" y="230">分类目录/工作</text>
    <rect x="314" y="274" width="726" height="66" rx="10" fill="#ffffff" stroke="#e3edf7"/>
    <text x="342" y="314">☐ 方案归档/历史版本</text>
    <text x="610" y="314">2026-05-21 09:12</text>
    <text x="760" y="314">分类目录/工作</text>
    <rect x="314" y="358" width="726" height="66" rx="10" fill="#ffffff" stroke="#e3edf7"/>
    <text x="342" y="398">☐ 培训资料.pdf</text>
    <text x="610" y="398">2026-05-20 22:36</text>
    <text x="760" y="398">分类目录/学习资料</text>
  </g>
  <rect x="314" y="454" width="470" height="102" rx="16" fill="#eef7ff" stroke="#cfe1f3"/>
  <text x="344" y="494" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#24486b">恢复逻辑</text>
  <text x="344" y="526" font-family="Arial, sans-serif" font-size="14" fill="#355f86">• 文件和文件夹删除后先进入回收站</text>
  <text x="344" y="552" font-family="Arial, sans-serif" font-size="14" fill="#355f86">• 支持单个恢复，也支持多选后批量恢复</text>
  <rect x="820" y="454" width="220" height="102" rx="16" fill="#ffffff" stroke="#cfe1f3"/>
  <rect x="846" y="478" width="168" height="34" rx="10" fill="#eaf4ff"/>
  <text x="892" y="500" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#2f587f">恢复</text>
  <rect x="846" y="522" width="168" height="34" rx="10" fill="#fff5f1"/>
  <text x="878" y="544" font-family="Arial, sans-serif" font-size="14" fill="#a85a45">彻底删除</text>
</svg>