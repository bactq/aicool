  <text x="74" y="472" font-family="Arial, sans-serif" font-size="15" fill="#355f86">▸ 图片</text>
  <text x="74" y="508" font-family="Arial, sans-serif" font-size="15" fill="#355f86">▸ 工作资料</text>
  <rect x="280" y="46" width="260" height="528" rx="18" fill="#ffffff" stroke="#cfe1f3"/>
