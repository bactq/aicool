  <rect width="1100" height="620" rx="24" fill="#f5faff"/>
  <rect x="28" y="28" width="220" height="564" rx="18" fill="#ffffff" stroke="#cfe1f3"/>
  <text x="54" y="78" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#233b5d">File Console</text>
  <rect x="54" y="126" width="168" height="42" rx="10" fill="#eaf4ff" stroke="#b7d4f0"/>
  <text x="78" y="153" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#2c5278">远程磁盘</text>
