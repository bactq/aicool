  <text x="338" y="224" font-family="Arial, sans-serif" font-size="16" fill="#294f72">▾ 分类目录 🔒</text>
  <text x="366" y="260" font-family="Arial, sans-serif" font-size="15" fill="#42698d">▸ 学习</text>
