<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="620" viewBox="0 0 1100 620" role="img" aria-labelledby="title desc">
  <title id="title">webcool 远程磁盘操作展示</title>
  <desc id="desc">展示远程磁盘中的目录树、文件列表、文件操作菜单，以及标签、锁、回收站等核心功能。</desc>
  <rect width="1100" height="620" rx="24" fill="#f5faff"/>
  <rect x="28" y="28" width="244" height="564" rx="18" fill="#ffffff" stroke="#cfe1f3"/>
  <text x="58" y="78" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#233b5d">Remote Disk</text>
  <rect x="56" y="118" width="188" height="44" rx="12" fill="#eaf4ff" stroke="#b7d4f0"/>
  <text x="84" y="146" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#2c5278">当前目录: 分类目录/工作</text>
  <rect x="56" y="188" width="188" height="330" rx="14" fill="#fbfdff" stroke="#d7e6f5"/>
  <text x="78" y="226" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#2d5275">目录树</text>
  <text x="78" y="270" font-family="Arial, sans-serif" font-size="15" fill="#355f86">▾ 根目录</text>
  <text x="102" y="306" font-family="Arial, sans-serif" font-size="15" fill="#355f86">▾ 分类目录 🔒</text>
  <text x="126" y="342" font-family="Arial, sans-serif" font-size="15" fill="#4b6f92">▸ 学习资料</text>
  <text x="126" y="378" font-family="Arial, sans-serif" font-size="15" fill="#4b6f92">▾ 工作</text>
  <text x="150" y="414" font-family="Arial, sans-serif" font-size="15" fill="#5a7c9c">• 方案归档</text>
  <text x="150" y="450" font-family="Arial, sans-serif" font-size="15" fill="#5a7c9c">• 视频素材</text>
  <text x="102" y="496" font-family="Arial, sans-serif" font-size="15" fill="#355f86">🗑 回收站</text>
  <rect x="296" y="28" width="544" height="564" rx="18" fill="#ffffff" stroke="#cfe1f3"/>
  <text x="330" y="78" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#233b5d">文件列表</text>
  <rect x="330" y="112" width="476" height="54" rx="12" fill="#f7fbff" stroke="#dce8f5"/>
  <text x="354" y="146" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#516b86">☑ 文件名</text>
  <text x="540" y="146" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#516b86">类型</text>
  <text x="646" y="146" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#516b86">大小</text>
  <text x="734" y="146" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#516b86">状态</text>
  <g font-family="Arial, sans-serif" font-size="15" fill="#25476a">
    <rect x="330" y="188" width="476" height="58" rx="10" fill="#ffffff" stroke="#e3edf7"/>
    <text x="354" y="224">☐ 🏷 发布计划.docx</text>
    <text x="540" y="224">文档</text>
    <text x="646" y="224">1.2 MB</text>
    <text x="734" y="224">可预览</text>
    <rect x="330" y="262" width="476" height="58" rx="10" fill="#ffffff" stroke="#e3edf7"/>
    <text x="354" y="298">☐ 🏷 培训录像.mp4 🔓</text>
    <text x="540" y="298">视频</text>
    <text x="646" y="298">2.8 GB</text>
    <text x="734" y="298">可续播</text>
    <rect x="330" y="336" width="476" height="58" rx="10" fill="#ffffff" stroke="#e3edf7"/>
    <text x="354" y="372">☐ 🏷 需求看板.png</text>
    <text x="540" y="372">图片</text>
    <text x="646" y="372">4.4 MB</text>
    <text x="734" y="372">可编辑</text>
    <rect x="330" y="410" width="476" height="58" rx="10" fill="#ffffff" stroke="#e3edf7"/>
    <text x="354" y="446">☐ 🏷 例会纪要.txt</text>
    <text x="540" y="446">文本</text>
    <text x="646" y="446">84 KB</text>
    <text x="734" y="446">可查看</text>
  </g>
  <rect x="862" y="110" width="208" height="278" rx="18" fill="#ffffff" stroke="#cfe1f3"/>
  <text x="892" y="150" font-family="Arial, sans-serif" font-size="21" font-weight="700" fill="#24486b">文件菜单</text>
  <rect x="888" y="174" width="156" height="32" rx="8" fill="#eaf4ff"/>
  <text x="912" y="195" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#2f587f">摘要</text>
  <rect x="888" y="214" width="156" height="32" rx="8" fill="#f5faff"/>
  <text x="912" y="235" font-family="Arial, sans-serif" font-size="14" fill="#355f86">下载</text>
  <rect x="888" y="254" width="156" height="32" rx="8" fill="#f5faff"/>
  <text x="912" y="275" font-family="Arial, sans-serif" font-size="14" fill="#355f86">改名</text>
  <rect x="888" y="294" width="156" height="32" rx="8" fill="#f5faff"/>
  <text x="912" y="315" font-family="Arial, sans-serif" font-size="14" fill="#355f86">加入标签</text>
  <rect x="888" y="334" width="156" height="32" rx="8" fill="#fff5f1"/>
  <text x="912" y="355" font-family="Arial, sans-serif" font-size="14" fill="#a85a45">删除到回收站</text>
  <rect x="862" y="414" width="208" height="122" rx="18" fill="#eef7ff" stroke="#cfe1f3"/>
  <text x="892" y="454" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#24486b">高频操作</text>
  <text x="892" y="490" font-family="Arial, sans-serif" font-size="14" fill="#355f86">• 单击选中，再次单击改名</text>
  <text x="892" y="518" font-family="Arial, sans-serif" font-size="14" fill="#355f86">• 双击执行下载</text>
  <text x="892" y="546" font-family="Arial, sans-serif" font-size="14" fill="#355f86">• 标签、锁、回收站同时可用</text>
</svg>