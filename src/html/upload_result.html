<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>上传结果</title>
  <style>
    :root {
      --bg1: #f4fbff;
      --bg2: #fff6eb;
      --ink: #20324a;
      --muted: #627086;
      --line: #dbe7f3;
      --card: rgba(255, 255, 255, .9);
      --link: #1e6fd9;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Avenir Next", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 12% 18%, rgba(123, 210, 255, .25), transparent 36%),
        radial-gradient(circle at 90% 10%, rgba(255, 192, 128, .28), transparent 32%),
        linear-gradient(145deg, var(--bg1), var(--bg2));
    }

    .card {
      width: min(760px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: 0 18px 40px rgba(26, 49, 78, .12);
      padding: 26px;
      animation: rise .42s ease-out both;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(24px, 3.4vw, 34px);
    }

    p { color: var(--muted); }

    ul { padding-left: 18px; margin: 14px 0 16px; }

    .file-item {
      padding: 8px 0;
      border-bottom: 1px dashed #d8e5f2;
    }

    .file-item:last-child { border-bottom: none; }

    a {
      color: var(--link);
      font-weight: 600;
      text-decoration: none;
    }

    a:hover { text-decoration: underline; }

    @keyframes rise {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>上传结果</h1>
    <p>共上传 {{SAVED_COUNT}} 个文件：</p>
    <ul>
      {{SAVED_LIST}}
    </ul>
    <p><a href="/files">查看全部已上传文件</a></p>
    <p><a href="/">返回上传页面</a></p>
  </main>
</body>
</html>
